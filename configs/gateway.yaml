gateway:
  websocket_port: 18789
  http_port: 8080
  log_level: info
  shutdown_timeout: 30s

channels:
  discord:
    enabled: true
    auth:
      token: ${DISCORD_BOT_TOKEN}
    options: {}

agents:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250220
  api_key: ${ANTHROPIC_API_KEY}
  max_history: 20
  temperature: 0.7
  max_tokens: 4096

tools:
  calculator:
    enabled: true
  message:
    enabled: true
  filesystem:
    enabled: true
    options:
      sandbox_dir: ~/BuckTooth-files
      max_file_size: 10485760  # 10MB
  calendar:
    enabled: false
  websearch:
    enabled: false

memory:
  type: inmemory
  options: {}

observability:
  metrics:
    enabled: true
    port: 8080
    path: /metrics
  tracing:
    enabled: false
    endpoint: http://localhost:14268/api/traces
    sample_rate: 0.1
    service_name: BuckTooth
