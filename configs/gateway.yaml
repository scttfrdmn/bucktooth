gateway:
  websocket_port: 18789
  http_port: 8080
  log_level: info
  shutdown_timeout: 30s
  # dashboard_auth_password: ""   # optional: enables Basic auth on /dashboard routes; also DASHBOARD_AUTH_PASSWORD env

channels:
  discord:
    enabled: true
    auth:
      token: ${DISCORD_BOT_TOKEN}
    options: {}
  whatsapp:
    enabled: false
    auth:
      session_file: ~/.bucktooth/whatsapp.db
    options:
      groups: false   # set true to handle group messages
  telegram:
    enabled: false
    auth:
      token: ${TELEGRAM_BOT_TOKEN}
  slack:
    enabled: false
    auth:
      bot_token: ${SLACK_BOT_TOKEN}   # xoxb-... token
      app_token: ${SLACK_APP_TOKEN}   # xapp-... Socket Mode token

agents:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250220
  api_key: ${ANTHROPIC_API_KEY}
  # api_base: ""   # optional: override Anthropic API endpoint (e.g. for proxies); also ANTHROPIC_API_BASE env
  max_history: 20
  temperature: 0.7
  max_tokens: 4096
  # mode: conversational | react (default when tools enabled) | planning
  mode: react

tools:
  calculator:
    enabled: true
  message:
    enabled: true
  filesystem:
    enabled: true
    options:
      sandbox_dir: ~/BuckTooth-files
      max_file_size: 10485760  # 10MB
  websearch:
    enabled: false
    options:
      api_key: ${BRAVE_SEARCH_API_KEY}
      max_results: 5
  calendar:
    enabled: false
    options:
      store_path: ~/.bucktooth/calendar.json

memory:
  type: inmemory   # or "redis"
  options: {}
  # Redis options (when type: redis):
  # options:
  #   addr: localhost:6379
  #   password: ""
  #   db: 0
  #   ttl: 24h
  #   max_history: 50

observability:
  metrics:
    enabled: true
    port: 8080
    path: /metrics
  tracing:
    enabled: false
    endpoint: localhost:4318   # OTLP HTTP (Jaeger/Tempo); omit the http:// scheme
    sample_rate: 0.1
    service_name: bucktooth
